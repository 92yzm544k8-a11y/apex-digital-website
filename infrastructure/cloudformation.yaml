AWSTemplateFormatVersion: "2010-09-09"
Description: Eryon website backend infrastructure

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging

Resources:
  ContactTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub eryon-contact-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub eryon-analytics-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

Outputs:
  ContactTableName:
    Value: !Ref ContactTable
    Description: DynamoDB table for contact form submissions
  AnalyticsTableName:
    Value: !Ref AnalyticsTable
    Description: DynamoDB table for analytics page views
